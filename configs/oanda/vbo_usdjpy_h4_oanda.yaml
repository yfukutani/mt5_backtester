# OANDA版 — VolBreakout USDJPY H4（ベース: configs/vbo_usdjpy_h4.yaml）
# ⚠️ ブレイクアウトはスリッページ/スプレッドに敏感。open_pricesは楽観的なので
#    OANDAの実スプレッドで目減りし得る → OANDA結果で要確認。
# 事前: OANDAのMetaEditorで experts/VolBreakout.mq5 をコンパイルしておく。
mt5_path: "C:\\Program Files\\OANDA MetaTrader 5\\terminal64.exe"

expert:    "VolBreakout"
symbol:    "USDJPY"
period:    "H4"
from_date: "2016.06.21"
to_date:   "2026.06.20"

deposit:  100000
currency: "JPY"
leverage: 25

model: "open_prices"

parameters:
  Channel_Period:   20
  AllowLong:        true
  AllowShort:       true
  UseSqueezeFilter: true
  Squeeze_Lookback: 50
  Squeeze_Factor:   1.0
  ATR_Period:       14
  ATR_SL_Mult:      2.0
  Trail_Mult:       3.0
  LotSize:          0.01
  UseRiskSizing:    false
  MagicNumber:      20260680
  ResultFileName:   "vbo_usdjpy_h4_oanda_result.csv"

report_dir:  "results"
report_name: "VolBreakout_USDJPY_H4_OANDA"
