# OANDA版 — Carry AUDJPY（判定D1・執行H1）（ベース: configs/carry_audjpy_d1.yaml）
# OANDA-JapanはD1始値(00:00)の成行が market closed で失敗するため、
# チャート(執行)H1 + SignalTimeframe=16408(PERIOD_D1) で判定D1・約定H1に分離。
# 2026.07.03: v1.1 MAクロス・ヒステリシス帯(±0.75ATR)を本番同様に反映（フォワードテスト整備）。
mt5_path: "C:\\Program Files\\OANDA MetaTrader 5\\terminal64.exe"

expert:    "Carry"
symbol:    "AUDJPY"
period:    "H1"
from_date: "2016.06.21"
to_date:   "2026.06.20"

deposit:  100000
currency: "JPY"
leverage: 25

model: "open_prices"

parameters:
  TrendMA_Period:      200
  SignalTimeframe:     16408
  RequirePositiveSwap: true
  UseHysteresis:       true
  ATR_Period:          14
  Hyst_ATR_Mult:       0.75
  LotSize:             0.05
  UseRiskSizing:       true
  RefDeposit:          100000.0
  MagicNumber:         20260650
  ResultFileName:      "carry_audjpy_d1_oanda_result.csv"

report_dir:  "results"
report_name: "Carry_AUDJPY_D1_OANDA"