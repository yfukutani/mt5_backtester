# OANDA版 — PullbackTrend GOLD→XAUUSD H4（ベース: configs/pullback_gold_h4.yaml）
# ⚠️ XAUUSDは【商品CFD専用口座】。FX口座(OANDA-Japan MT5 Live)では取引不可。
#    実行時はOANDA端末を【商品CFD口座】にログインした状態で回すこと（FXとは別口座・別サーバー）。
#    契約サイズ/最小ロットがXMと異なる可能性 → 初回結果でロット・損益スケールを要確認。
# 事前: OANDAのMetaEditorで experts/PullbackTrend.mq5 をコンパイルしておく。
mt5_path: "C:\\Program Files\\OANDA MetaTrader 5\\terminal64.exe"

expert:    "PullbackTrend"
symbol:    "XAUUSD"
period:    "H4"
from_date: "2016.06.21"
to_date:   "2026.06.20"

deposit:  100000
currency: "JPY"
leverage: 20

model: "open_prices"

parameters:
  TrendMA_Period:          200
  FastEMA_Period:          20
  SlowEMA_Period:          50
  RequireBullishCandle:    true
  UsePullbackQuality:      true
  UseMomentumConfirm:      true
  UseADXFilter:            true
  ADX_Period:              14
  ADX_Threshold:           22.5
  UseTrendStrength:        true
  MA_Slope_Lookback:       20
  MA_Slope_Min_ATR:        1.2
  UseATRStops:             true
  ATR_Period:              14
  ATR_SL_Mult:             2.0
  RR_Ratio:                2.0
  StopLoss_Pips:           50
  TakeProfit_Pips:         110
  LotSize:                 0.01
  UseRiskSizing:           false
  MagicNumber:             20260640
  ResultFileName:          "pullback_gold_h4_oanda_result.csv"

report_dir:  "results"
report_name: "PullbackTrend_XAUUSD_H4_OANDA"
