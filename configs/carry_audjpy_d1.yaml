# キャリートレード（スワップ収集）— AUDJPY D1（別軸の収益源）
# Carry v1.1: D1のMA200±0.75ATRヒステリシス帯で買い長期保有。スワップ＋順張りトレンドを取る。
# AUDはRBA金利>BOJ金利が一貫し、キャリーが全サイクルで機能（経済的合理性）。
# v1.1: MAクロス・ヒステリシス帯を採用（2026.07.02、docs/carry.md）。entry=MA+0.75ATR超え/
#   exit=MA−0.75ATR割れで、MA付近の往復ビンタ損失を削減。複利0.05で
#   +177,524→+209,966(+18%)/DD30.49%→24.17%/取引36→13。b=0.5〜1.0の広いプラトーで
#   OOS(+23,721→+32,183)/IS(+95,678→+97,357)両期間で改善、every_tickでは+149,032→+238,486(+60%)
#   と改善が拡大（往復のスプレッド実費が削減されるため）。ETHは不採用（-11%、パラボリック相場では
#   再エントリーが利益源）。
# H4トレンド/逆張りEAと別メカニズム（D1長期保有）で低相関の独立収益源。
# ⚠️ MT5テスターは現在スワップ率を全履歴に適用するため、スワップ収益は近似（スポットP&Lは正確）。
# サイジング: 資産連動複利0.05採用。キャリーは滑らか＆高PFでレバレッジ耐性が高い。
#   ⚠️ スワップ近似のため高レバほど不確実性増。
