#                     + リバーサル増しロット(第2弾F2-3: ドリフト逆方向ブレイクは2倍)。
# 全期間+239,109/PF1.73/DD13.9%(every_tick)。Boost無し比+17.6%（3銘柄合算+28%・効率1.38・
# IS/OOS/3銘柄の3重一貫をログ検証済み。リバーサル型はOOSでもPF1.41と安定）。
# Boost前基準: +203,317/PF1.70/DD11.1%・IS(2021-26)+163,827/PF1.83・OOS+39,490。
# MinRange 0.40(C案C14): レンジ窓短縮(1-9h)に伴う閾値の再正規化（旧0.45は新窓では過剰に厳格。
