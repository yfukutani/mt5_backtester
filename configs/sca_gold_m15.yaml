# レンジ開始1時(B案D3): サーバー0時台ノイズの除外。2時開始はOOS-30%でゲート不通過。
# 20時決済(A案A13): NY午後の逆流を持たない。金曜スキップ(S案C2): 週末前の質劣化を回避。
# 履歴: 初版+134,501/PF1.44/DD16.1% → 金曜+143,253 → 20時+162,012 → 窓1-9h+166,115
#       → MinR0.40 +203,317/PF1.70/DD11.1%（累積+51.2%・DD-5.0pt）。
# 発見: エッジは広レンジ日に集中（MinRange 0.30-0.60の広いプラトー、狭レンジ日は有毒）。
# リスク%サイジングはエッジ（レンジ幅加重）を反転させ破綻するため固定ロット厳守。
# エグジット系改良（failed-break/部分利食い/トレール/リテスト）は全て逆効果＝
