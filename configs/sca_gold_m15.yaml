# 最終形(2026.07.05): Range1-9h/TE15/RR1.5/buf0.05/MinRange0.45 + 金曜スキップ + 20時決済。
# 全期間+166,115/PF1.78/DD12.8%(every_tick)。IS(2021-26)+127,139/PF1.83・OOS+38,976（両期間改善）。
# レンジ開始1時(B案D3): サーバー0時台（シドニー/東京早朝）のノイズをレンジから除外。
# 2時開始(+175k/PF1.90)はさらに強いがIS集中・OOS-30%のためゲート不通過（点適合を避けR19採用）。
